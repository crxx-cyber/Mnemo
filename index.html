<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mnemo — Knowledge Vault</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Ambient noise overlay -->
  <canvas id="noiseCanvas" class="noise-overlay"></canvas>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">M</div>
      <div class="brand-text">
        <span class="brand-name">Mnemo</span>
        <span class="brand-tagline">Knowledge Vault</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="notes" onclick="switchView('notes', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Notes
      </button>
      <button class="nav-item" data-view="flashcards" onclick="switchView('flashcards', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        Flashcards
      </button>
    </nav>

    <div class="sidebar-section">
      <div class="section-label">
        <span>Subjects</span>
        <button class="add-btn" onclick="openSubjectModal()" title="Add Subject">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
      <ul class="subject-list" id="subjectList">
        <!-- Rendered by JS -->
      </ul>
    </div>

    <div class="sidebar-footer">
      <div class="stat-row" id="statRow">
        <div class="stat"><span id="statNotes">0</span><small>notes</small></div>
        <div class="stat-div"></div>
        <div class="stat"><span id="statCards">0</span><small>cards</small></div>
        <div class="stat-div"></div>
        <div class="stat"><span id="statSubjects">0</span><small>subjects</small></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()" id="hamburger">
          <span></span><span></span><span></span>
        </button>
        <h1 class="topbar-title" id="topbarTitle">All Notes</h1>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search notes…" oninput="handleSearch()" autocomplete="off" />
        </div>
        <button class="cta-btn" id="ctaBtn" onclick="openNoteModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          New Note
        </button>
      </div>
    </header>

    <!-- NOTES VIEW -->
    <section class="view active" id="view-notes">
      <div class="filter-strip" id="filterStrip">
        <button class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">All</button>
        <button class="filter-chip" data-filter="flashcard" onclick="setFilter('flashcard', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:12px;height:12px"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
          Flashcards only
        </button>
      </div>

      <div class="notes-grid" id="notesGrid"></div>

      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-glyph">◈</div>
        <p class="empty-title">No notes yet</p>
        <p class="empty-sub">Start capturing your knowledge</p>
        <button class="cta-btn" onclick="openNoteModal()">Create first note</button>
      </div>
    </section>

    <!-- FLASHCARDS VIEW -->
    <section class="view" id="view-flashcards">
      <div class="fc-header">
        <div class="fc-controls">
          <div class="select-wrap">
            <select id="fcSubjectFilter" onchange="loadFlashcards()">
              <option value="all">All Subjects</option>
            </select>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <button class="shuffle-btn" onclick="shuffleFlashcards()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6"/></svg>
            Shuffle
          </button>
        </div>
        <div class="fc-score-display" id="fcScoreDisplay" style="display:none">
          <span class="fc-score-correct" id="fcCorrect">0</span>
          <span class="fc-score-sep">/</span>
          <span id="fcTotal">0</span>
          <span class="fc-score-label">correct</span>
        </div>
      </div>

      <div class="fc-arena" id="fcArena">
        <div class="fc-empty" id="fcEmpty">
          <div class="empty-glyph">⟡</div>
          <p>No flashcards found.<br>Toggle "Add as Flashcard" when creating notes.</p>
        </div>

        <div id="fcMain" style="display:none">
          <div class="fc-progress-bar-wrap">
            <div class="fc-progress-bar" id="fcProgressBar"></div>
          </div>
          <p class="fc-counter" id="fcCounter">Card 1 of 1</p>

          <div class="flashcard-scene" onclick="flipCard()">
            <div class="flashcard" id="flashcard">
              <div class="flashcard-face flashcard-front">
                <span class="face-label">Question</span>
                <div class="face-content" id="fcFront"></div>
              </div>
              <div class="flashcard-face flashcard-back">
                <span class="face-label">Answer</span>
                <div class="face-content" id="fcBack"></div>
              </div>
            </div>
          </div>

          <p class="fc-flip-hint" id="fcHint">Tap card to reveal answer</p>

          <div class="fc-nav">
            <button class="fc-nav-btn" onclick="prevCard()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
              Prev
            </button>
            <div class="fc-rating-btns" id="fcRatingBtns" style="display:none">
              <button class="fc-rate wrong" onclick="rateCard(false)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Missed it
              </button>
              <button class="fc-rate correct" onclick="rateCard(true)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                Got it
              </button>
            </div>
            <button class="fc-nav-btn" onclick="nextCard()">
              Next
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ═══ MODALS ═══ -->

  <!-- Note Modal -->
  <div class="overlay" id="noteModal" onclick="overlayClose(event,'noteModal')">
    <div class="modal" id="noteModalBox">
      <div class="modal-hd">
        <h2 id="modalHeading">New Note</h2>
        <button class="close-btn" onclick="closeModal('noteModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editingNoteId" />
        <div class="field">
          <label>Title <span class="req">*</span></label>
          <input type="text" id="noteTitle" placeholder="e.g. Newton's Second Law, Pythagorean Theorem…" />
        </div>
        <div class="field-row">
          <div class="field">
            <label>Subject</label>
            <div class="select-wrap">
              <select id="noteSubject">
                <option value="">— Unsorted —</option>
              </select>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          <div class="field">
            <label>Tag <small>(optional)</small></label>
            <input type="text" id="noteTag" placeholder="e.g. Formula, Theorem…" />
          </div>
        </div>
        <div class="field">
          <label>Content <span class="req">*</span></label>
          <div class="editor-toolbar" id="toolbar">
            <button type="button" onclick="fmt('bold')" title="Bold"><b>B</b></button>
            <button type="button" onclick="fmt('italic')" title="Italic"><em>I</em></button>
            <button type="button" onclick="fmt('underline')" title="Underline"><u>U</u></button>
            <div class="tb-sep"></div>
            <button type="button" onclick="wrapFormula()" title="Formula block">∑</button>
            <button type="button" onclick="insertUL()" title="Bullet list">≡</button>
            <div class="tb-sep"></div>
            <button type="button" onclick="fmt('foreColor','#7dd3fc')" style="color:#7dd3fc" title="Highlight blue">A</button>
            <button type="button" onclick="fmt('foreColor','#fbbf24')" style="color:#fbbf24" title="Highlight gold">A</button>
            <button type="button" onclick="fmt('foreColor','#86efac')" style="color:#86efac" title="Highlight green">A</button>
          </div>
          <div class="editor" id="noteContent" contenteditable="true" data-placeholder="Write your note, formula, or definition…"></div>
        </div>
        <div class="field fc-toggle-field">
          <label class="toggle-row">
            <span class="toggle-wrap">
              <input type="checkbox" id="noteIsFlashcard" onchange="toggleFcField()" />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </span>
            <span>
              <strong>Save as Flashcard</strong>
              <small>Title = question · Content = answer</small>
            </span>
          </label>
        </div>
      </div>
      <div class="modal-ft">
        <button class="btn-ghost" onclick="closeModal('noteModal')">Cancel</button>
        <button class="btn-primary" onclick="saveNote()">Save Note</button>
      </div>
    </div>
  </div>

  <!-- Subject Modal -->
  <div class="overlay" id="subjectModal" onclick="overlayClose(event,'subjectModal')">
    <div class="modal modal-sm" id="subjectModalBox">
      <div class="modal-hd">
        <h2 id="subjectModalHeading">New Subject</h2>
        <button class="close-btn" onclick="closeModal('subjectModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editingSubjectId" />
        <div class="field">
          <label>Subject Name <span class="req">*</span></label>
          <input type="text" id="subjectNameInput" placeholder="e.g. Physics Formulas, English Words…" />
        </div>
        <div class="field">
          <label>Accent Color</label>
          <div class="color-swatches" id="colorSwatches"></div>
        </div>
        <div class="field">
          <label>Icon</label>
          <div class="icon-grid" id="iconGrid"></div>
        </div>
      </div>
      <div class="modal-ft">
        <button class="btn-ghost" onclick="closeModal('subjectModal')">Cancel</button>
        <button class="btn-primary" onclick="saveSubject()">Save</button>
      </div>
    </div>
  </div>

  <!-- View Note Modal -->
  <div class="overlay" id="viewModal" onclick="overlayClose(event,'viewModal')">
    <div class="modal modal-view" id="viewModalBox">
      <div class="modal-hd">
        <div>
          <h2 id="viewTitle"></h2>
          <div class="view-meta" id="viewMeta"></div>
        </div>
        <div class="view-actions">
          <button class="icon-action" onclick="editViewedNote()" title="Edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
          <button class="icon-action danger" onclick="deleteViewedNote()" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
          <button class="close-btn" onclick="closeModal('viewModal')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="modal-body">
        <div class="view-content" id="viewContent"></div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
